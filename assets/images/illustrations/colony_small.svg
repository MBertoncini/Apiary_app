<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#FFF8E7" stroke="#F5D77A" stroke-width="2"/>

  <!-- Ground / grass -->
  <ellipse cx="100" cy="168" rx="70" ry="8" fill="#8BC34A" opacity="0.5"/>
  <path d="M55 168 Q58 155 61 168" fill="#66BB6A" opacity="0.6"/>
  <path d="M72 168 Q75 152 78 168" fill="#66BB6A" opacity="0.7"/>
  <path d="M120 168 Q123 154 126 168" fill="#66BB6A" opacity="0.6"/>
  <path d="M135 168 Q138 158 141 168" fill="#66BB6A" opacity="0.5"/>

  <!-- Small beehive - simple cute style -->
  <path d="M80 165 L80 120 Q80 105 100 100 Q120 105 120 120 L120 165 Z" fill="#F5C542"/>
  <path d="M80 165 L80 120 Q80 105 100 100 Q120 105 120 120 L120 165 Z" fill="url(#hiveGradSmall)" stroke="#D4A017" stroke-width="1.5"/>

  <!-- Hive stripes -->
  <line x1="82" y1="125" x2="118" y2="125" stroke="#D4A017" stroke-width="1" opacity="0.5"/>
  <line x1="81" y1="135" x2="119" y2="135" stroke="#D4A017" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="145" x2="120" y2="145" stroke="#D4A017" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="155" x2="120" y2="155" stroke="#D4A017" stroke-width="1" opacity="0.5"/>

  <!-- Hive entrance -->
  <ellipse cx="100" cy="158" rx="8" ry="10" fill="#5D4037"/>

  <!-- Small stand -->
  <rect x="78" y="165" width="44" height="4" rx="2" fill="#8D6E63"/>
  <rect x="83" y="169" width="4" height="10" fill="#8D6E63"/>
  <rect x="113" y="169" width="4" height="10" fill="#8D6E63"/>

  <!-- Single cute bee -->
  <g transform="translate(62, 80)">
    <!-- Wings -->
    <ellipse cx="-4" cy="-5" rx="7" ry="4" fill="white" opacity="0.7" transform="rotate(-20)"/>
    <ellipse cx="6" cy="-5" rx="7" ry="4" fill="white" opacity="0.7" transform="rotate(20)"/>
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="8" ry="6" fill="#FFD54F"/>
    <!-- Stripes -->
    <rect x="-3" y="-6" width="3" height="12" rx="1" fill="#5D4037" opacity="0.7"/>
    <rect x="2" y="-5" width="3" height="10" rx="1" fill="#5D4037" opacity="0.7"/>
    <!-- Head -->
    <circle cx="-9" cy="0" r="5" fill="#FFD54F"/>
    <!-- Eyes -->
    <circle cx="-11" cy="-1" r="1.5" fill="#333"/>
    <!-- Smile -->
    <path d="M-12 1.5 Q-9 4 -7 1.5" fill="none" stroke="#333" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Antenna -->
    <line x1="-12" y1="-4" x2="-15" y2="-9" stroke="#5D4037" stroke-width="0.8"/>
    <circle cx="-15" cy="-9.5" r="1" fill="#5D4037"/>
    <line x1="-8" y1="-4" x2="-9" y2="-10" stroke="#5D4037" stroke-width="0.8"/>
    <circle cx="-9" cy="-10.5" r="1" fill="#5D4037"/>
    <!-- Stinger -->
    <path d="M8 0 L12 0" stroke="#5D4037" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Small flower -->
  <g transform="translate(140, 155)">
    <line x1="0" y1="0" x2="0" y2="13" stroke="#66BB6A" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="4" fill="#FFB74D"/>
    <circle cx="0" cy="-4" r="2.5" fill="#FFF176" opacity="0.8"/>
    <circle cx="3.5" cy="-1" r="2.5" fill="#FFF176" opacity="0.8"/>
    <circle cx="3.5" cy="3" r="2.5" fill="#FFF176" opacity="0.8"/>
    <circle cx="0" cy="4" r="2.5" fill="#FFF176" opacity="0.8"/>
    <circle cx="-3.5" cy="3" r="2.5" fill="#FFF176" opacity="0.8"/>
    <circle cx="-3.5" cy="-1" r="2.5" fill="#FFF176" opacity="0.8"/>
    <circle cx="0" cy="0" r="2.5" fill="#FFB74D"/>
  </g>

  <!-- Label -->
  <text x="100" y="30" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#8D6E63">PICCOLA</text>

  <!-- Small honeycomb decoration -->
  <g transform="translate(150, 55)" opacity="0.3">
    <polygon points="0,-6 5.2,-3 5.2,3 0,6 -5.2,3 -5.2,-3" fill="#F5C542" stroke="#D4A017" stroke-width="0.5"/>
  </g>
  <g transform="translate(161, 46)" opacity="0.2">
    <polygon points="0,-5 4.3,-2.5 4.3,2.5 0,5 -4.3,2.5 -4.3,-2.5" fill="#F5C542" stroke="#D4A017" stroke-width="0.5"/>
  </g>

  <defs>
    <linearGradient id="hiveGradSmall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE082" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F5C542" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>