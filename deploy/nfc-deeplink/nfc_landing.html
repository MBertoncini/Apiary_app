<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apri arnia · Apiary</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           margin: 0; padding: 24px; background: #FFF8E1; color: #1a1a1a; }
    .card { max-width: 480px; margin: 40px auto; background: white;
            border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; margin: 0 0 8px 0; }
    p { font-size: 14px; line-height: 1.5; color: #555; }
    .btn { display: block; padding: 14px 16px; margin: 12px 0;
           border-radius: 8px; text-align: center; text-decoration: none;
           font-weight: 600; }
    .btn-primary { background: #FFC107; color: #1a1a1a; }
    .btn-secondary { background: #f3f3f3; color: #1a1a1a; }
    .nfc { font-family: monospace; font-size: 12px; color: #888; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🐝 Tag arnia rilevato</h1>
    <p>Hai scansionato un tag NFC associato a un'arnia. Per visualizzare i dettagli, apri l'app Apiary.</p>

    <a class="btn btn-primary" href="{{ deep_link_custom }}">Apri in Apiary App</a>

    <p style="margin-top: 24px;">Non hai ancora l'app?</p>
    <a class="btn btn-secondary" href="{{ play_store_url }}">Scarica su Google Play</a>
    <a class="btn btn-secondary" href="{{ app_store_url }}">Scarica su App Store</a>

    <p class="nfc">ID tag: {{ nfc_id }}</p>
  </div>

  <script>
    // Tentativo automatico di aprire l'app via custom scheme dopo 500ms.
    // Se l'app non è installata, il browser ignora silenziosamente.
    setTimeout(function() { window.location.href = "{{ deep_link_custom }}"; }, 500);
  </script>
</body>
</html>
