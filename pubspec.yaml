name: apiary_app
description: Un'app per la gestione degli apiari.

publish_to: 'none'

version: 1.0.2+11

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.0.5
  http: ^1.1.0
  shared_preferences: ^2.2.1
  intl: ^0.19.0
  sqflite: ^2.3.0
  flutter_map: ^5.0.0
  latlong2: ^0.9.0
  geolocator: ^10.0.1
  image_picker: ^1.0.4
  package_info_plus: ^4.1.0
  flutter_local_notifications: ^17.2.1
  permission_handler: ^11.0.0
  connectivity_plus: ^4.0.2
  cached_network_image: ^3.3.0
  url_launcher: ^6.1.14
  flutter_svg: ^2.0.17
  fl_chart: ^0.65.0
  flutter_riverpod: ^2.0.0
  flutter_local_notifications_linux: ^4.0.0+1
  flutter_speed_dial: ^7.0.0
  mobile_scanner: ^5.1.0
  qr_flutter: ^4.1.0
  share_plus: ^10.0.0
  path_provider: ^2.1.2
  screenshot: ^3.0.0   # Per catturare screenshot dei grafici
  flutter_background_service: ^5.0.0  # Già in uso nella tua app
  audioplayers: ^5.1.0 
  vibration: 3.1.3    # Per feedback aptico
  google_speech: ^2.2.0
  flutter_sound: ^9.28.0
  google_fonts: ^6.2.1
  speech_to_text: ^7.0.0
  sensors_plus: ^4.0.0
  flutter_image_compress: ^2.1.0
  pdf: ^3.10.0
  printing: ^5.13.0
  csv: ^5.1.1
  flutter_timezone: ^3.0.1
  flutter_background_service_android: ^6.2.2
  tflite_flutter: ^0.12.1
  image: ^4.0.17
  shimmer: ^3.0.0
  flutter_map_marker_cluster: ^1.2.0
  google_sign_in: ^6.2.1
  purchases_flutter: ^10.0.0
  purchases_ui_flutter: ^10.0.0
  nfc_manager: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/backgrounds/
    - assets/images/icons/
    - assets/images/illustrations/
    - assets/sounds/
    - assets/models/
  fonts:
    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat-Regular.ttf
        - asset: assets/fonts/Caveat-Bold.ttf
          weight: 700
    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand-Regular.ttf
        - asset: assets/fonts/Quicksand-Medium.ttf
          weight: 500
        - asset: assets/fonts/Quicksand-Bold.ttf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700


flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/icons/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFC107"
  adaptive_icon_foreground: "assets/images/icons/icon_foreground.png"
  remove_alpha_ios: true

